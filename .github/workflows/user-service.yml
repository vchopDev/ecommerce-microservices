name: User Service CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres_test:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: secret
          POSTGRES_DB: user_service_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        working-directory: services/user-service
        run: npx prisma generate

      - name: Run unit tests
        run: npx nx affected --target=test --projects=@app/user-service --base=origin/main --head=HEAD

      - name: Run migrations
        working-directory: services/user-service
        env:
          DATABASE_URL: postgresql://app:secret@localhost:5433/user_service_test
        run: npx prisma migrate deploy

      - name: Run E2E tests
        working-directory: services/user-service
        env:
          DATABASE_URL: postgresql://app:secret@localhost:5433/user_service_test
          JWT_SECRET: test-secret
          JWT_EXPIRES_IN: 7d
        run: npm run test:e2e

      - name: Build Docker image
        run: docker build -f services/user-service/Dockerfile -t user-service:${{ github.sha }} .