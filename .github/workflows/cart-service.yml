name: Cart Service CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      redis_test:
        image: redis:7-alpine
        ports:
          - 6380:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        working-directory: services/cart-service
        run: npm run test:unit

      - name: Run E2E tests
        working-directory: services/cart-service
        env:
          REDIS_URL: redis://localhost:6380
          JWT_SECRET: test-secret
          PORT: 3003
          CATALOG_URL: http://localhost:3002
          ALLOWED_ORIGINS: http://localhost:5173
          CART_TTL_SECONDS: 2592000
        run: npm run test:e2e

      - name: Build Docker image
        run: docker build -f services/cart-service/Dockerfile -t cart-service:${{ github.sha }} .