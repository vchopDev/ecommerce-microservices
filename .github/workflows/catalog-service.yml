name: Catalog Service CI

on:
  push:
    branches:
      - main
    paths:
      - 'services/catalog-service/**'
      - '.github/workflows/catalog-service.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'services/catalog-service/**'
      - '.github/workflows/catalog-service.yml'

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mongodb_test:
        image: mongo:7
        ports:
          - 27018:27017

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Install dependencies
        working-directory: services/catalog-service
        run: npm ci --prefix ../..

      - name: Run unit tests
        working-directory: services/catalog-service
        run: npm run test:unit

      - name: Run E2E tests
        working-directory: services/catalog-service
        env:
          MONGODB_URI: mongodb://localhost:27018/catalog_service_test
          JWT_SECRET: test-secret
          PORT: 3002
        run: npm run test:e2e

      - name: Build Docker image
        run: docker build -f services/catalog-service/Dockerfile -t catalog-service:${{ github.sha }} .