name: Catalog Service CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mongodb_test:
        image: mongo:7
        ports:
          - 27018:27017

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npx nx affected --target=test --projects=@app/catalog-service --base=origin/main --head=HEAD

      - name: Run E2E tests
        working-directory: services/catalog-service
        env:
          MONGODB_URI: mongodb://localhost:27018/catalog_service_test
          JWT_SECRET: test-secret
          PORT: 3002
        run: npm run test:e2e

      - name: Build Docker image
        run: docker build -f services/catalog-service/Dockerfile -t catalog-service:${{ github.sha }} .