services:
  postgres_test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: user_service_test
    ports:
      - "5433:5432"
    volumes:
      - postgres_test_data:/var/lib/postgresql/data

  postgres_order_test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: order_service_test
    ports:
      - "5435:5432"
    volumes:
      - postgres_order_test_data:/var/lib/postgresql/data

  mongodb_test:
    image: mongo:7
    ports:
      - "27018:27017"
    volumes:
      - mongo_test_data:/data/db

  redis_test:
    image: redis:7-alpine
    ports:
      - "6380:6379"

  rabbitmq_test:
    image: rabbitmq:3.13-management-alpine
    ports:
      - "5673:5672"
      - "15673:15672"
    volumes:
      - rabbitmq_test_data:/var/lib/rabbitmq

volumes:
  postgres_test_data:
  postgres_order_test_data:
  mongo_test_data:
  rabbitmq_test_data: