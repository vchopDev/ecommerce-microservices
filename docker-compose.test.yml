services:
  postgres_test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: user_service_test
    ports:
      - "5433:5432"
    volumes:
      - postgres_test_data:/var/lib/postgresql/data

  mongodb_test:
    image: mongo:7
    ports:
      - "27018:27017"
    volumes:
      - mongo_test_data:/data/db

  redis_test:
    image: redis:7-alpine
    ports:
      - "6380:6379"

volumes:
  postgres_test_data:
  mongo_test_data: